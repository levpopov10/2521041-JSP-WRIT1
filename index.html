<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Rush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════ SCREEN 1: PLAYERS ═══════════════════════════════ -->
<div id="screen-players" class="screen active">
  <div class="game-title">Quiz<br>Rush</div>
  <div class="game-sub">Web Dev Edition</div>

  <div class="card">
    <h2>How many players?</h2>
    <div class="player-count-row">
      <button class="count-btn selected" data-n="1">1</button>
      <button class="count-btn" data-n="2">2</button>
      <button class="count-btn" data-n="3">3</button>
      <button class="count-btn" data-n="4">4</button>
    </div>
  </div>

  <div class="card" id="name-card">
    <h2>Player Names</h2>
    <div class="player-inputs" id="player-inputs"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-to-subject">Next →</button>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 2: SUBJECT ═══════════════════════════════ -->
<div id="screen-subject" class="screen">
  <div class="game-title">Quiz<br>Rush</div>
  <div class="game-sub">Web Dev Edition</div>

  <div class="card">
    <h2>Choose Subject</h2>
    <div class="subject-grid">
      <button class="subject-btn selected" data-s="HTML">HTML</button>
      <button class="subject-btn" data-s="CSS">CSS</button>
      <button class="subject-btn" data-s="JavaScript">JavaScript</button>
      <button class="subject-btn" data-s="Mixed">Mixed</button>
    </div>
  </div>

  <div class="card">
    <h2>Questions per Player</h2>
    <div class="diff-row">
      <button class="diff-btn selected" data-q="3"><span>3</span>Default</button>
      <button class="diff-btn" data-q="4"><span>4</span>Advanced</button>
      <button class="diff-btn" data-q="5"><span>5</span>Expert</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="btn-back">← Back</button>
    <button class="btn btn-primary" id="btn-start">Start Game</button>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 3: GAME ═══════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="turn-banner">
    <div class="turn-dot" id="turn-dot"></div>
    <div class="turn-name" id="turn-name"></div>
    <div class="turn-score">Score: <strong id="turn-score">0</strong></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar-bg">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="timer-num" id="timer-num">15</div>
  </div>

  <div class="card">
    <div class="question-meta" id="q-meta"></div>
    <div class="question-text" id="q-text"></div>
    <div class="answers-grid" id="answers"></div>
    <div class="submit-row">
      <button class="btn-submit" id="btn-submit" disabled>Submit Answer</button>
    </div>
  </div>

  <div class="progress-dots" id="progress-dots"></div>
</div>

<!-- ═══════════════════════════════ SCREEN 4: END ═══════════════════════════════ -->
<div id="screen-end" class="screen">
  <div class="game-title">Results</div>
  <div class="game-sub">Game Over</div>

  <div class="podium" id="podium"></div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-review">Review Answers</button>
    <button class="btn btn-primary" id="btn-new-game">New Game</button>
  </div>
</div>

<!-- ═══════════════════════════════ SCREEN 5: REVIEW ═══════════════════════════════ -->
<div id="screen-review" class="screen">
  <div class="game-title">Review</div>
  <div class="game-sub">All Questions</div>
  <div id="review-content"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-back-results">← Back to Results</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
