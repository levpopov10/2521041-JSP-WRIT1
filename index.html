<body>
  <div class="app">
    <header>
      <h1>Quiz Rush</h1>
    </header>

    <!-- Screen 1: Player selection -->
    <section id="screen-players" class="screen active">
      <h2>Select Players</h2>
      <div class="players-row" id="playersRow"></div>
      <div class="controls">
        <button id="to-subject" class="btn primary">Next</button>
      </div>
    </section>

    <!-- Screen 2: Subject & difficulty -->
    <section id="screen-subject" class="screen">
      <h2>Select Subject & Difficulty</h2>
      <div class="form-grid">
        <div>
          <label>Subject</label>
          <div class="choices" id="subjectChoices"></div>
        </div>
        <div>
          <label>Questions per player</label>
          <div class="choices" id="difficultyChoices"></div>
        </div>
      </div>
      <div class="controls">
        <button id="back-players" class="btn">Prev</button>
        <button id="start-game" class="btn primary">Start Game</button>
      </div>
    </section>

    <!-- Screen 3: Game -->
    <section id="screen-game" class="screen">
      <div class="game-top">
        <div id="currentPlayerName" class="player-indicator"></div>
        <div id="timer" class="timer">--</div>
      </div>
      <div id="questionBox" class="question-box">
        <div id="questionText" class="question-text"></div>
        <div id="optionsGrid" class="options-grid"></div>
      </div>
      <div class="controls">
        <button id="submitAnswer" class="btn primary" disabled>Submit</button>
      </div>
    </section>

    <!-- Screen 4: Results -->
    <section id="screen-results" class="screen">
      <h2>Results</h2>
      <div id="resultsList" class="results-list"></div>
      <div class="controls">
        <button id="btnReview" class="btn">Review Answers</button>
        <button id="btnRestart" class="btn primary">Start New Game</button>
      </div>
    </section>

    <!-- Review modal / screen -->
    <section id="screen-review" class="screen">
      <h2>Review</h2>
      <div id="reviewList" class="review-list"></div>
      <div class="controls">
        <button id="reviewBack" class="btn">Back</button>
        <button id="reviewRestart" class="btn primary">Start New Game</button>
      </div>
    </section>

  </div>
